# This workflow updates the latest-version sentinel files on the benchmarks
# branch whenever a new GA (non-preview) release tag is created.
#
# Two complementary sentinels are maintained, both following the
# "filename-is-the-version, body-is-empty" convention used by the existing
# securitywarnings/ and blockedversions/ folders. Clients only ever HEAD
# these files — they never read the body — so a poisoned response cannot
# influence blobfuse2 behavior (no parsing, no RCE surface).
#
#   release/latest/<version>     – empty marker named after the current latest
#                                  version. There is always exactly one file
#                                  in this directory.
#   release/outdated/<version>   – empty marker for EVERY version that has
#                                  been superseded by a newer GA release.
#                                  The blobfuse2 binary probes
#                                  release/outdated/<localVersion> on startup;
#                                  a HEAD-200 means the local build is older
#                                  than the published latest and an upgrade
#                                  warning is emitted. A build newer than the
#                                  published latest has NO marker here and is
#                                  therefore correctly classified as
#                                  up-to-date (this is the bug fix — the old
#                                  logic flagged any non-equal version).
#
# Trigger: creation of a tag matching "blobfuse2-*" that does NOT contain
# "preview" (e.g. blobfuse2-2.5.3). Preview tags are intentionally excluded.

name: Update Latest Version

on:
  push:
    tags:
      - 'blobfuse2-*'

jobs:
  update-latest-version:
    # Skip preview / pre-release tags.
    if: "!contains(github.ref_name, 'preview')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Checkout the benchmarks branch where release metadata lives.
      - name: Checkout benchmarks branch
        uses: actions/checkout@v6
        with:
          ref: benchmarks
          fetch-depth: 0

      # Promote the prior latest to outdated/, then point latest/ at the new
      # version. Marker files are empty — only their names carry meaning.
      - name: Update latest and outdated sentinel files
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          NEW_VERSION="${TAG_NAME#blobfuse2-}"
          echo "New release version: ${NEW_VERSION}"

          mkdir -p release/outdated

          echo "release/latest/ before:"
          ls -l release/latest/

          # Move every existing marker in release/latest/ to release/outdated/.
          # In steady state there is exactly one such file (the prior latest),
          # but the glob handles any leftover from a partial run.
          shopt -s nullglob
          for f in release/latest/*; do
            prior=$(basename "$f")
            # Don't demote the version we are about to publish.
            if [ "${prior}" = "${NEW_VERSION}" ]; then
              continue
            fi
            echo "Promoting prior latest [${prior}] to outdated/"
            rm -f "release/latest/${prior}"
            touch "release/outdated/${prior}"
          done
          shopt -u nullglob

          # Create the new empty marker for the freshly released version.
          touch "release/latest/${NEW_VERSION}"

          # Make sure the new version is NOT also marked outdated (defensive
          # cleanup in case of a re-run of the same tag).
          rm -f "release/outdated/${NEW_VERSION}"

          echo "release/latest/ after:"
          ls -l release/latest/
          echo "release/outdated/ after:"
          ls -l release/outdated/ || true

      # Commit and push the change to the benchmarks branch.
      - name: Commit and push to benchmarks
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          NEW_VERSION="${TAG_NAME#blobfuse2-}"

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add release/latest/ release/outdated/

          # Only commit and push if there are staged changes.
          if git diff --cached --quiet; then
            echo "No changes to commit; skipping commit and push."
          else
            git commit -m "Update latest version to ${NEW_VERSION}"
            git push origin benchmarks
          fi
