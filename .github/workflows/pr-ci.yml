# PR CI – on-demand replica of blobfuse2-1es_ci.yaml (Azure DevOps).
#
# This workflow exists because the corresponding Azure DevOps pipeline cannot
# be triggered automatically on pull requests from external (fork) contributors
# in our organization. Instead of running on every PR, this workflow only runs
# when an authorized maintainer leaves a comment containing the command
# `/ok-to-test` on the pull request.
#
# Authorization is enforced via the comment author's association with the repo:
# only OWNER, MEMBER or COLLABORATOR comments will trigger the run. Comments
# from first-time contributors / external users are ignored.
#
# NOTE: Unit tests and any other steps that require Azure Storage credentials
# only run when the corresponding repository secrets are configured. The
# secret names below mirror the variables consumed by the ADO pipeline's
# `NightlyBlobFuse` variable group (BF2_BLK_ACC_NAME, BF2_BLK_ACC_KEY,
# BF2_ADLS_ACC_NAME, BF2_ADLS_ACC_KEY, BF2_BLK_ACC_SAS, BF2_ADLS_ACC_SAS,
# BF2_MSI_APP_ID, BF2_MSI_CLIENT_ID, BF2_MSI_OBJECT_ID,
# AZTEST_BLOCK_CONT_SAS_UBN_18, AZTEST_BLOCK_CONT_SAS_UBN_20,
# AZTEST_ADLS_CONT_SAS_UBN_20, AZTEST_ADLS_CONT_SAS_UBN_22).
name: PR CI (on-demand)

# Do not trigger this pipeline automatically on push or pull_request events.
# It must be explicitly invoked by a maintainer comment on a PR.
on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  checks: write
  statuses: write

jobs:
  # ------------------------------------------------------------------
  # Gate job: validates that the comment is on a PR, contains the
  # `/ok-to-test` command, and was authored by a repo member /
  # collaborator / owner. Resolves the PR head SHA so subsequent jobs
  # check out the exact commit the maintainer is approving.
  # ------------------------------------------------------------------
  authorize:
    name: Authorize CI run
    if: >-
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/ok-to-test') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.pr.outputs.sha }}
      ref: ${{ steps.pr.outputs.ref }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
    steps:
      - name: React to triggering comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Resolve PR head SHA
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('sha', pr.data.head.sha);
            core.setOutput('ref', pr.data.head.ref);
            core.setOutput('pr_number', String(pr.data.number));

      - name: Post run link on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 PR CI started by @${context.payload.comment.user.login} on commit \`${{ steps.pr.outputs.sha }}\`.\n\nFollow progress: ${url}`
            });

      - name: Set pending commit status
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.pr.outputs.sha }}',
              state: 'pending',
              target_url: url,
              context: 'PR CI (on-demand)',
              description: 'CI run triggered via /ok-to-test'
            });

  # ------------------------------------------------------------------
  # Main CI job: matrix mirrors the `test` job in blobfuse2-1es_ci.yaml.
  # ------------------------------------------------------------------
  ci:
    name: ${{ matrix.name }}
    needs: authorize
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu-20 (fuse2)
            runs-on: ubuntu-22.04
            fuselib: libfuse-dev
            fuse_runtime: libfuse2
            tags: fuse2
            adls_sas_secret: AZTEST_ADLS_CONT_SAS_UBN_20
            block_sas_secret: AZTEST_BLOCK_CONT_SAS_UBN_20
          - name: Ubuntu-22 (fuse3)
            runs-on: ubuntu-22.04
            fuselib: libfuse3-dev
            fuse_runtime: fuse3
            tags: fuse3
            adls_sas_secret: AZTEST_ADLS_CONT_SAS_UBN_22
            block_sas_secret: AZTEST_BLOCK_CONT_SAS_UBN_20
          - name: Ubuntu-22 ARM64 (fuse3)
            runs-on: ubuntu-22.04-arm
            fuselib: libfuse3-dev
            fuse_runtime: fuse3
            tags: fuse3
            adls_sas_secret: AZTEST_ADLS_CONT_SAS_UBN_22
            block_sas_secret: AZTEST_BLOCK_CONT_SAS_UBN_20
    env:
      WORK_DIR: ${{ github.workspace }}
      ROOT_DIR: ${{ runner.temp }}
      TEMP_DIR: ${{ runner.temp }}
      MOUNT_DIR: ${{ runner.temp }}/blob_mnt
      GOPATH: ${{ runner.temp }}/go
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.authorize.outputs.sha }}
          fetch-depth: 0

      # Mirrors azure-pipeline-templates/package-install.yml (ubuntu branch)
      - name: Install system packages (libfuse, build tools, az cli)
        run: |
          set -euxo pipefail
          sudo apt-get update --fix-missing
          sudo apt-get install -y make cmake gcc g++ git parallel pkg-config curl wget ca-certificates
          sudo apt-get install -y ${{ matrix.fuse_runtime }} ${{ matrix.fuselib }}
          fusermount3 -V || true
          fusermount -V || true
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az --version

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Show info
        run: |
          set -euxo pipefail
          git --no-pager log -1 --oneline
          ls -lrt
          go version
          mkdir -p "${MOUNT_DIR}" "${TEMP_DIR}" "${GOPATH}/src"

      # Mirrors the "Go Get" + "Go Build" steps in build.yml
      - name: Go module download
        run: go mod download

      - name: Build blobfuse2
        run: go build -tags ${{ matrix.tags }} -o blobfuse2

      - name: Build bfusemon
        run: go build -tags ${{ matrix.tags }} -o bfusemon ./tools/health-monitor/

      - name: Test binary
        run: |
          chmod +x ./blobfuse2
          ./blobfuse2 --version

      # ----------------------------------------------------------------
      # Unit tests – only run if the storage account secrets that the
      # ADO pipeline relies on are configured in the GitHub repo. We
      # detect this by checking whether BF2_BLK_ACC_NAME is set.
      # ----------------------------------------------------------------
      - name: Check whether Azure storage secrets are available
        id: secrets
        env:
          BF2_BLK_ACC_NAME: ${{ secrets.BF2_BLK_ACC_NAME }}
        run: |
          if [ -n "${BF2_BLK_ACC_NAME:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Azure Storage secrets are not configured; skipping unit tests that need them."
          fi

      - name: Generate per-run container name
        if: steps.secrets.outputs.available == 'true'
        id: container
        run: |
          CONTAINER_NAME=$(cat /dev/urandom | tr -dc 'a-z0-9' | fold -w 40 | head -n 1)
          echo "name=${CONTAINER_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create test containers (block + adls)
        if: steps.secrets.outputs.available == 'true'
        env:
          BF2_BLK_ACC_NAME: ${{ secrets.BF2_BLK_ACC_NAME }}
          BF2_BLK_ACC_KEY: ${{ secrets.BF2_BLK_ACC_KEY }}
          BF2_ADLS_ACC_NAME: ${{ secrets.BF2_ADLS_ACC_NAME }}
          BF2_ADLS_ACC_KEY: ${{ secrets.BF2_ADLS_ACC_KEY }}
          CONTAINER_NAME: ${{ steps.container.outputs.name }}
        run: |
          set -euxo pipefail
          az storage container create --name "$CONTAINER_NAME" \
            --account-name "$BF2_BLK_ACC_NAME" --account-key "$BF2_BLK_ACC_KEY" --fail-on-exist
          az storage container create --name "$CONTAINER_NAME" \
            --account-name "$BF2_ADLS_ACC_NAME" --account-key "$BF2_ADLS_ACC_KEY" --fail-on-exist

      - name: Write azuretest.json
        if: steps.secrets.outputs.available == 'true'
        env:
          BF2_BLK_ACC_NAME: ${{ secrets.BF2_BLK_ACC_NAME }}
          BF2_BLK_ACC_KEY: ${{ secrets.BF2_BLK_ACC_KEY }}
          BF2_BLK_ACC_SAS: ${{ secrets.BF2_BLK_ACC_SAS }}
          BF2_ADLS_ACC_NAME: ${{ secrets.BF2_ADLS_ACC_NAME }}
          BF2_ADLS_ACC_KEY: ${{ secrets.BF2_ADLS_ACC_KEY }}
          BF2_ADLS_ACC_SAS: ${{ secrets.BF2_ADLS_ACC_SAS }}
          BF2_MSI_APP_ID: ${{ secrets.BF2_MSI_APP_ID }}
          BF2_MSI_CLIENT_ID: ${{ secrets.BF2_MSI_CLIENT_ID }}
          BF2_MSI_OBJECT_ID: ${{ secrets.BF2_MSI_OBJECT_ID }}
          AZTEST_BLOCK_CONT_SAS_UBN_18: ${{ secrets.AZTEST_BLOCK_CONT_SAS_UBN_18 }}
          AZTEST_BLOCK_CONT_SAS_UBN_20: ${{ secrets[matrix.block_sas_secret] }}
          CONTAINER_NAME: ${{ steps.container.outputs.name }}
        run: |
          set -euo pipefail
          cat > "$HOME/azuretest.json" <<JSON
          {
            "block-acct": "${BF2_BLK_ACC_NAME}",
            "adls-acct": "${BF2_ADLS_ACC_NAME}",
            "block-cont": "${CONTAINER_NAME}",
            "adls-cont": "${CONTAINER_NAME}",
            "block-key": "${BF2_BLK_ACC_KEY}",
            "adls-key": "${BF2_ADLS_ACC_KEY}",
            "block-sas": "${BF2_BLK_ACC_SAS}",
            "block-cont-sas-ubn-18": "${AZTEST_BLOCK_CONT_SAS_UBN_18}",
            "block-cont-sas-ubn-20": "${AZTEST_BLOCK_CONT_SAS_UBN_20}",
            "adls-sas": "${BF2_ADLS_ACC_SAS}",
            "msi-appid": "${BF2_MSI_APP_ID}",
            "msi-resid": "${BF2_MSI_CLIENT_ID}",
            "msi-objid": "${BF2_MSI_OBJECT_ID}",
            "skip-msi": "true",
            "skip-azcli": "true",
            "proxy-address": "no_proxy"
          }
          JSON

      - name: Unit tests
        if: steps.secrets.outputs.available == 'true'
        continue-on-error: true
        run: |
          go test -v -timeout=45m ./... --tags=unittest,${{ matrix.tags }} -coverprofile utcover.cov

      - name: Code Coverage Report
        if: steps.secrets.outputs.available == 'true'
        continue-on-error: true
        run: |
          if [ -f utcover.cov ]; then
            go tool cover -func utcover.cov
          fi

      - name: Upload coverage artifact
        if: steps.secrets.outputs.available == 'true' && hashFiles('utcover.cov') != ''
        uses: actions/upload-artifact@v4
        with:
          name: utcover-${{ matrix.tags }}-${{ runner.arch }}
          path: utcover.cov

      # Mirrors "Static Analysis (Lint)" step
      - name: Static Analysis (Lint)
        if: always()
        run: |
          set -euo pipefail
          curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.11.0
          "$(go env GOPATH)/bin/golangci-lint" --version
          "$(go env GOPATH)/bin/golangci-lint" run --build-tags ${{ matrix.tags }} > lint.log || true
          result=$(wc -l < lint.log)
          if [ "$result" -gt 1 ]; then
            echo "-----------------------------------"
            echo "Below issues are found in SA"
            cat lint.log
            echo "-----------------------------------"
            exit 1
          else
            echo "-----------------------------------"
            echo "No issues are found in SA"
            echo "-----------------------------------"
          fi

      # Mirrors "Copyright check"
      - name: Copyright check
        if: always()
        run: |
          set -euo pipefail
          result=$(grep -L -r --include \*.go "$(date +%Y) Microsoft Corporation" ./ | wc -l)
          if [ "$result" -ne 0 ]; then
            echo "Files missing copyright statement for $(date +%Y):"
            grep -L -r --include \*.go "$(date +%Y) Microsoft Corporation" ./ || true
            exit 1
          fi
          echo "Copyright statements are up to date"

      # Mirrors "Go Format Check"
      - name: Go Format Check
        run: |
          out=$(gofmt -s -l -d .)
          if [ -n "$out" ]; then
            echo "$out"
            exit 1
          fi

      # Mirrors "Notice file check"
      - name: Notice file check
        if: always()
        run: |
          set -euo pipefail
          ./notices_fix.sh
          result=$(git diff NOTICE | wc -l)
          if [ "$result" -gt 12 ]; then
            echo "Notices needs a fix. Run ./notices_fix.sh and commit NOTICE file."
            git --no-pager diff NOTICE
            exit 1
          fi
          echo "Notices are up to date."

      # Cleanup test containers (mirrors cleanup.yml with delete_containers:true)
      - name: Delete test containers
        if: always() && steps.secrets.outputs.available == 'true' && steps.container.outputs.name != ''
        env:
          BF2_BLK_ACC_NAME: ${{ secrets.BF2_BLK_ACC_NAME }}
          BF2_BLK_ACC_KEY: ${{ secrets.BF2_BLK_ACC_KEY }}
          BF2_ADLS_ACC_NAME: ${{ secrets.BF2_ADLS_ACC_NAME }}
          BF2_ADLS_ACC_KEY: ${{ secrets.BF2_ADLS_ACC_KEY }}
          CONTAINER_NAME: ${{ steps.container.outputs.name }}
        run: |
          set +e
          az storage container delete --name "$CONTAINER_NAME" \
            --account-name "$BF2_BLK_ACC_NAME" --account-key "$BF2_BLK_ACC_KEY"
          az storage container delete --name "$CONTAINER_NAME" \
            --account-name "$BF2_ADLS_ACC_NAME" --account-key "$BF2_ADLS_ACC_KEY"

  # ------------------------------------------------------------------
  # Final job: report aggregated outcome back to the PR via a commit
  # status (success/failure) so reviewers see a clear signal.
  # ------------------------------------------------------------------
  report:
    name: Report CI status
    needs: [authorize, ci]
    if: always() && needs.authorize.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Update commit status
        uses: actions/github-script@v7
        with:
          script: |
            const ciResult = ${{ toJson(needs.ci.result) }};
            const state = ciResult === 'success' ? 'success' : 'failure';
            const url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ needs.authorize.outputs.sha }}',
              state: state,
              target_url: url,
              context: 'PR CI (on-demand)',
              description: `CI ${state} (result: ${ciResult})`
            });
