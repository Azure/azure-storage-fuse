name: Step-2 Mirror GitHub Content to Blob Storage

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"   #  every Sunday at 00:00 UTC

permissions:
  id-token: write
  contents: read
  issues: read
  pull-requests: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # ✅ 3 hours
    
    env:
      AZURE_STORAGE_ACCOUNT: blobfusemcpserver

    steps:
      - uses: actions/checkout@v4

      # ✅ Azure authentication (OIDC)
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_MCP_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_MCP_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_MCP_SUBSCRIPTION_ID }}

      # ✅ Upload repo code
      - name: Upload repo code
        run: |
          az storage blob upload-batch \
            --auth-mode login \
            --account-name $AZURE_STORAGE_ACCOUNT \
            --container-name repo-code \
            --source . \
            --destination azure-storage-fuse

      # ✅ Upload wiki
      - name: Clone wiki
        run: |
          git clone https://github.com/Azure/azure-storage-fuse.wiki.git wiki

      - name: Upload wiki docs
        run: |
          az storage blob upload-batch \
            --auth-mode login \
            --account-name $AZURE_STORAGE_ACCOUNT \
            --container-name repo-docs \
            --source wiki \
            --destination wiki

      # ✅ Export issues / PRs
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests

      - name: Export GitHub history
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/export_github_history.py

      # ✅ Upload GitHub history
      - name: Upload GitHub history
        run: |
          az storage blob upload-batch \
            --auth-mode login \
            --account-name $AZURE_STORAGE_ACCOUNT \
            --container-name repo-gh \
            --source out_github_export \
            --destination .
