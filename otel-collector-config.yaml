receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024

exporters:
  azuremonitor:
    connection_string: "${APPLICATIONINSIGHTS_CONNECTION_STRING}"
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 10000
    
  # Optional: Also export to console for debugging
  debug: {}

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      # Export to Azure Monitor only. To also see logs in collector output,
      # add 'debug' to the exporters list: exporters: [azuremonitor, debug]
      exporters: [azuremonitor]
    metrics:
      receivers: [otlp]
      processors: [batch]
      # Export metrics to Azure Monitor. Add 'debug' to also see metrics in collector output.
      exporters: [azuremonitor]