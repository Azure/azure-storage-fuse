// Distributed cache wire protocol. This proto file defines the message format
// for communicating with the distributed cache server. It is compatible with
// the server's cache.proto schema.

syntax = "proto3";

package cache;

option go_package = "github.com/Azure/azure-storage-fuse/v2/internal/dist_cache_client/proto";

message AuthParams {
  bool enabled = 1;
  uint32 version = 2;
  string accountname = 3;
  uint32 timestamp = 4;
  bytes signature = 5;
}

// --- Lock ---

message LockFileRequest {
  string requestid = 999;
  string filename = 1;
  AuthParams authparams = 2;
}

message LockFileResponse {
  enum Result {
    SUCCESS = 0;
    ALREADY_LOCKED = 1;
    AUTH_FAILED = 2;
    INTERNAL_ERROR = 3;
  }
  Result result = 1;
}

// --- Upload ---

message UploadRequest {
  string requestid = 999;
  string filename = 1;
  uint64 filesize = 2;
  bool ignorelock = 3;
  uint32 expiryseconds = 4;
  map<string, bytes> metadata = 5;
  AuthParams authparams = 6;
  bytes groupid = 7;
}

message UploadResponse {
  enum Result {
    SUCCESS = 0;
    FILE_EXISTS = 1;
    AUTH_FAILED = 2;
    INTERNAL_ERROR = 3;
    BAD_REQUEST = 4;
  }
  Result result = 1;
}

// --- Download ---

message DownloadRequest {
  string requestid = 999;
  string filename = 1;
  uint64 offset = 2;
  uint64 length = 3;
  bool enablelock = 4;
  AuthParams authparams = 5;
}

message DownloadResponse {
  enum Result {
    SUCCESS = 0;
    NOT_FOUND_GOT_LOCK = 1;
    NOT_FOUND_ALREADY_LOCKED = 2;
    NOT_FOUND = 3;
    INVALID_OFFSET_LENGTH = 4;
    FILENAME_LIMIT_EXCEEDED = 5;
    AUTH_FAILED = 6;
    INTERNAL_ERROR = 7;
  }
  Result result = 1;
  uint64 filesize = 2;
  map<string, bytes> metadata = 3;
  bool isFullDownload = 4;
}

// --- Delete ---

message DeleteRequest {
  string requestid = 999;
  oneof type {
    string filename = 1;
    bytes groupid = 2;
    string lastaccesstime = 4;
  }
  AuthParams authparams = 3;
}

message DeleteResponse {
  enum Result {
    SUCCESS = 0;
    AUTH_FAILED = 1;
    INTERNAL_ERROR = 2;
  }
  Result result = 1;
}

// --- Attributes ---

message FileAttribute {
  bool isdir = 1;
  uint64 filesize = 2;
  uint64 accessedtime = 3;
  uint64 modifiedtime = 4;
}

message FileAttributes {
  string filename = 1;
  FileAttribute fileattribute = 2;
}

message GetAttributeRequest {
  string requestid = 999;
  string filename = 1;
  bool enablelock = 2;
  AuthParams authparams = 3;
}

message GetAttributeResponse {
  enum Result {
    SUCCESS = 0;
    NOT_FOUND_GOT_LOCK = 1;
    NOT_FOUND = 2;
    AUTH_FAILED = 3;
    INTERNAL_ERROR = 4;
  }
  Result result = 1;
  FileAttribute fileattribute = 2;
}

message PutAttributeRequest {
  string requestid = 999;
  repeated FileAttributes fileattributes = 1;
  AuthParams authparams = 2;
}

message PutAttributeResponse {
  enum Result {
    SUCCESS = 0;
    AUTH_FAILED = 1;
    INTERNAL_ERROR = 2;
  }
  Result result = 1;
}

// --- InfiniBand ---

message IBInitRequest {
  string requestid = 999;
  uint32 clientlid = 1;
  uint32 clientibport = 2;
  uint32 clientmtu = 3;
  repeated uint32 clientqpn = 4;
  AuthParams authparams = 5;
}

message IBInitResponse {
  enum Result {
    SUCCESS = 0;
    AUTH_FAILED = 1;
    IB_NOT_SUPPORTED = 2;
    INTERNAL_ERROR = 3;
  }
  Result result = 1;
  uint32 serverlid = 2;
  uint32 serveribport = 3;
  uint32 servermtu = 4;
  repeated uint32 serverqpn = 5;
}

// --- Cache Analytics ---

message GetCacheLastAccessTimeDistributionRequest {
  string requestid = 999;
  uint32 distributionbucketsizeinhours = 1;
  AuthParams authparams = 2;
}

message GetCacheLastAccessTimeDistributionResponse {
  enum Result {
    SUCCESS = 0;
    AUTH_FAILED = 1;
    INTERNAL_ERROR = 2;
  }
  Result result = 1;
  map<int64, uint64> distributionmap = 2;
}

// --- Server Discovery ---

message GetCacheServersRequest {
  string requestid = 999;
}

message GetCacheServersResponse {
  enum Result {
    SUCCESS = 0;
    INTERNAL_ERROR = 1;
  }
  Result result = 1;
  repeated string serveraddresses = 2;
}

// --- End Marker ---

message EndMarker {}

// --- Locator ---

message LocatorContentReplica {
  string nodeId = 1;
  uint64 expiresAt = 2;
  uint64 lastRefreshed = 3;
}

message LocatorRegisterRequest {
  string requestid = 999;
  string key = 1;
  LocatorContentReplica replica = 2;
  AuthParams authparams = 3;
}

message LocatorRegisterResponse {
  enum Result {
    SUCCESS = 0;
    AUTH_FAILED = 1;
    INTERNAL_ERROR = 2;
  }
  Result result = 1;
}

message LocatorLookupRequest {
  string requestid = 999;
  string key = 1;
  AuthParams authparams = 2;
}

message LocatorLookupResponse {
  enum Result {
    SUCCESS = 0;
    NOT_FOUND = 1;
    AUTH_FAILED = 2;
    INTERNAL_ERROR = 3;
  }
  Result result = 1;
  repeated LocatorContentReplica replicas = 2;
}

message LocatorRefreshRequest {
  string requestid = 999;
  string key = 1;
  LocatorContentReplica replica = 2;
  AuthParams authparams = 3;
}

message LocatorRefreshResponse {
  enum Result {
    SUCCESS = 0;
    AUTH_FAILED = 1;
    INTERNAL_ERROR = 2;
  }
  Result result = 1;
}

message LocatorUnregisterRequest {
  string requestid = 999;
  string key = 1;
  string nodeId = 2;
  AuthParams authparams = 3;
}

message LocatorUnregisterResponse {
  enum Result {
    SUCCESS = 0;
    AUTH_FAILED = 1;
    INTERNAL_ERROR = 2;
  }
  Result result = 1;
}

// --- Wrapper ---

message Request {
  oneof payload {
    LockFileRequest lockrequest = 1;
    UploadRequest uploadrequest = 2;
    DownloadRequest downloadrequest = 3;
    GetAttributeRequest getattributerequest = 4;
    PutAttributeRequest putattributerequest = 5;
    DeleteRequest deleterequest = 6;
    IBInitRequest ibinitrequest = 7;
    GetCacheLastAccessTimeDistributionRequest getcachelastaccesstimedistributionrequest = 8;
    GetCacheServersRequest getcacheserversrequest = 9;
    LocatorRegisterRequest locatorregisterrequest = 11;
    LocatorLookupRequest locatorlookuprequest = 12;
    LocatorRefreshRequest locatorrefreshrequest = 13;
    LocatorUnregisterRequest locatorunregisterrequest = 14;
    EndMarker endmarker = 15;
  }
}
