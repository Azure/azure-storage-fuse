parameters:
  - name: work_dir
    type: string
  - name: root_dir
    type: string
  - name: unit_test
    type: boolean
    default: false
  - name: tags
    type: string
    default: "null"
  - name: container
    type: string

steps:
  # Installing Go tool
  - task: ShellScript@2
    inputs:
      scriptPath: "${{ parameters.work_dir }}/go_installer.sh"
      args: "${{ parameters.root_dir }}/"
    displayName: "Installing Go tools"

  # Installing Blobfuse2 Dependencies via go get
  - task: Go@0
    inputs:
      command: 'get'
      arguments: '-d'
      workingDirectory: ${{ parameters.work_dir }}
    displayName: "Installing Blobfuse2 Dependencies"

  # Build the binary
  # build.sh sets CGO_ENABLED=1 and GOTOOLCHAIN=local, but FIPS compliance
  # also requires CI to install the Microsoft Go toolchain via go_installer.sh
  # first, because GOTOOLCHAIN=local uses that locally installed toolchain.
  # Keeping the build flags and required toolchain aligned avoids drift between
  # local dev and CI/release builds.
  - script: |
      chmod 755 build.sh
      ./build.sh ${{ parameters.tags }}
    workingDirectory: ${{ parameters.work_dir }}
    displayName: "Building Blobfuse2"

  # Verify that fuse3 release headers expose cache_readdir and that blobfuse2's
  # compatibility check recognizes the libfuse 3.16.1 forwarding boundary.
  # Older runtimes are supported build targets; blobfuse2 detects them at mount
  # time and disables kernel list caching with an accurate warning.
  - script: |
      if [[ "${{ parameters.tags }}" != "fuse3" ]]; then
        exit 0
      fi

      fuse_version=`pkg-config --modversion fuse3`
      echo "Building with libfuse ${fuse_version}"

      gcc $(pkg-config --cflags fuse3) tools/check_kernel_list_cache.c \
        $(pkg-config --libs fuse3) \
        -o /tmp/check-kernel-list-cache
      /tmp/check-kernel-list-cache
    workingDirectory: ${{ parameters.work_dir }}
    displayName: "Verify kernel list cache compatibility detection"

  # Verifying whether built binary is correct
  - script: |
      sudo chmod +x ./blobfuse2
      ./blobfuse2 --version
    workingDirectory: ${{ parameters.work_dir }}
    displayName: "Test Binary built"
    continueOnError: false

  # Build the health-monitor binary
  - script: |
      chmod 755 build.sh
      ./build.sh health
    workingDirectory: ${{ parameters.work_dir }}
    displayName: "Building health-monitor binary"
    continueOnError: false

  # Verifying whether built binary is correct
  - script: |
      sudo chmod +x ./bfusemon
      ./bfusemon --version
    workingDirectory: ${{ parameters.work_dir }}
    displayName: "Test bfusemon binary built"
    continueOnError: false

  # Run Unit tests if parameters is true
  - ${{ if eq(parameters.unit_test, true) }}:
      - script: |
          cnfFile=$HOME/azuretest.json
          echo $cnfFile
          touch $cnfFile
          echo "{" > $cnfFile
          echo "\"block-acct\"": "\"$(BF2_BLK_ACC_NAME)\"", >> $cnfFile
          echo "\"adls-acct\"": "\"$(BF2_ADLS_ACC_NAME)\"", >> $cnfFile
          echo "\"block-cont\"": "\"${{ parameters.container }}\"", >> $cnfFile
          echo "\"adls-cont\"": "\"${{ parameters.container }}\"", >> $cnfFile
          echo "\"block-key\"": "\"$(BF2_BLK_ACC_KEY)\"", >> $cnfFile
          echo "\"adls-key\"": "\"$(BF2_ADLS_ACC_KEY)\"", >> $cnfFile
          echo "\"block-sas\"": "\"$(BF2_BLK_ACC_SAS)\"", >> $cnfFile
          echo "\"block-cont-sas-ubn-18\"": "\"$(AZTEST_BLOCK_CONT_SAS_UBN_18)\"", >> $cnfFile
          echo "\"block-cont-sas-ubn-20\"": "\"$(AZTEST_BLOCK_CONT_SAS_UBN_20)\"", >> $cnfFile
          echo "\"adls-sas\"": "\"$(BF2_ADLS_ACC_SAS)\"", >> $cnfFile
          echo "\"msi-appid\"": "\"$(AZTEST_APP_ID)\"", >> $cnfFile
          echo "\"msi-resid\"": "\"$(AZTEST_RES_ID)\"", >> $cnfFile
          echo "\"msi-objid\"": "\"$(AZTEST_OBJ_ID)\"", >> $cnfFile
          echo "\"skip-msi\"": "true", >> $cnfFile
          echo "\"skip-azcli\"": "true", >> $cnfFile
          echo "\"proxy-address\"": "\"\"" >> $cnfFile
          echo "}" >> $cnfFile
          cat $cnfFile
        displayName: "Create AzureTest Config"
        continueOnError: false
        workingDirectory: ${{ parameters.work_dir }}

      - task: Go@0
        inputs:
          command: 'test'
          arguments: '-v -timeout=2h ./... --tags=unittest,${{ parameters.tags }} -coverprofile utcover.cov'
          workingDirectory: ${{ parameters.work_dir }}
        displayName: "Unit tests"
