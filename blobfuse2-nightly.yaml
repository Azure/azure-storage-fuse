# Blobfuse2 Nightly Build Pipeline

schedules:
  # Cron string < minute hour day-of-month month day-of-week>
  #             * means all, for example '*' in day of month means everyday
  # Run only on main branch
  # 'always' controls whether to run only if there is a change or not
  # Run this pipeline every 15:00 time
  - cron: '0 15 * * *'
    displayName: 'Daily midnight Blobfuse2 build'
    branches:
      include:
        - main

parameters:
  - name: base_test
    # Quick test or an exhaustive test
    displayName: 'Basic test'
    type: boolean
    default: true

  - name: exhaustive_test
    # Quick test or an exhaustive test
    displayName: 'Run E2E tests on all UBUNTU distros'
    type: boolean
    default: true

  - name: include_other_distros
    # Quick test or an exhaustive test
    displayName: 'Run E2E tests on all non-UBUNTU distros'
    type: boolean
    default: true

  - name: fio_test
    displayName: 'Run fio workloads to check data integrity'
    type: boolean
    default: false

  - name: scenario_tests
    displayName: 'Run various scenario based workloads to check data integrity'
    type: boolean
    default: true

  - name: rman_backup_test
    displayName: 'Run RMAN backup simulation to check data integrity'
    type: boolean
    default: true

  - name: linux_git_test
    displayName: 'Compile Linux Source and Run git clone Tests'
    type: string
    values:
    - file_cache
    - block_cache
    - none
    default: none

  - name: proxy_test
  # Proxy tests
    displayName: 'Proxy test'
    type: boolean
    default: true

  - name: msi_test
    # MSI auth based test suites to be run or not
    displayName: 'MSI test'
    type: boolean
    default: true

  - name: quick_stress
    displayName: 'Quick Stress'
    type: boolean
    default: true

  - name: verbose_log
    displayName: 'Verbose Log'
    type: boolean
    default: false

  - name: healthmon
    displayName: 'Run tests for Health monitor'
    type: boolean
    default: true

stages:

  - ${{ if eq(parameters.base_test, true) }}:
    - stage: BuildAndTest
      jobs:
        # Ubuntu Tests for Block account
        - job: Set_1
          timeoutInMinutes: 300

          strategy:
            matrix:
              Ubuntu-20-BlockBlob:
                AgentName: 'blobfuse-ubuntu20'
                distro: 'ubuntu'
                distro_version: 'ubuntu_20'
                poolName: 'blobfuse-ubuntu-pool'
                fuselib: 'libfuse-dev'
                tags: 'fuse2'
              Ubuntu-22-BlockBlob:
                AgentName: 'blobfuse-ubuntu22'
                distro: 'ubuntu'
                distro_version: 'ubuntu_22_x86'
                poolName: 'blobfuse-ubuntu-pool'
                fuselib: 'libfuse3-dev'
                tags: 'fuse3'
              Ubuntu-22-ARM64-BlockBlob:
                AgentName: 'blobfuse-ubn22-arm64'
                distro: 'ubuntu'
                distro_version: 'ubuntu_22_arm64'
                poolName: 'blobfuse-ubn-arm64-pool'
                fuselib: 'libfuse3-dev'
                tags: 'fuse3'

          pool:
            name: $(poolName)
            demands:
              - ImageOverride -equals $(AgentName)

          variables:
            - group: NightlyBlobFuse
            - name: MOUNT_DIR
              value: '$(Pipeline.Workspace)/blob_mnt'
            - name: TEMP_DIR
              value: '$(Pipeline.Workspace)/blobfuse2_tmp'
            - name: BLOBFUSE2_CFG
              value: '$(Pipeline.Workspace)/blobfuse2.yaml'
            - name: BLOBFUSE2_SAS_CFG
              value: '$(Pipeline.Workspace)/blobfuse2_sas_config.yaml'
            - name: BLOBFUSE2_AZCLI_CFG
              value: '$(Pipeline.Workspace)/blobfuse2_azcli_config.yaml'
            - name: BLOBFUSE2_ADLS_CFG
              value: '$(Pipeline.Workspace)/blobfuse2.adls.yaml'
            - name: BLOBFUSE2_GTEST_CFG
              value: '$(Pipeline.Workspace)/connection.yaml'
            - name: BLOBFUSE2_AZURITE_CFG
              value: '$(Pipeline.Workspace)/blobfuse2_azurite_config.yaml'
            - name: BLOBFUSE2_STRESS_DIR
              value: '$(Pipeline.Workspace)/blobfuse2_stress'
            - name: DECODE_PERCENTS
              value: false
            - name: GOPATH
              value: '$(Pipeline.Workspace)/go'
            - name: ROOT_DIR
              value: '$(Agent.TempDirectory)'
            - name: WORK_DIR
              value: '$(Build.SourcesDirectory)'

          steps:
            # -------------------------------------------------------
            # Build the code and create the containers.
            - template: 'azure-pipeline-templates/build.yml'
              parameters:
                skip_azcli: "false"

            # -------------------------------------------------------
            - template: 'azure-pipeline-templates/invalid-command-tests.yml'


            - ${{ if eq(parameters.exhaustive_test, true) }}:
              - template: 'azure-pipeline-templates/verbose-tests.yml'
                parameters:
                  service: 'BlockBlob'
                  account_type: 'block'
                  account_endpoint: 'https://$(BF2_BLK_ACC_NAME).blob.core.windows.net'
                  adls: false
                  account_name: $(BF2_BLK_ACC_NAME)
                  account_key: $(BF2_BLK_ACC_KEY)
                  account_sas: $(BF2_BLK_ACC_SAS)
                  client_id: $(AZTEST_CLIENT)
                  tenant_id: $(AZTEST_TENANT)
                  client_secret: $(AZTEST_SECRET)
                  config: $(BLOBFUSE2_CFG)
                  stress_dir: $(BLOBFUSE2_STRESS_DIR)
                  huge_container: 'million-files'
                  quick_stress: ${{ parameters.quick_stress }}
                  test_key_credential: true
                  test_sas_credential: true
                  test_azcli_credential: false
                  test_azurite: false
                  sas_credential_config: $(BLOBFUSE2_SAS_CFG)
                  azcli_credential_config: $(BLOBFUSE2_AZCLI_CFG)
                  azurite_config: $(BLOBFUSE2_AZURITE_CFG)
                  distro_name: $(AgentName)
                  verbose_log: ${{ parameters.verbose_log }}

            - template: azure-pipeline-templates/cleanup.yml
              parameters:
                unmount: true
                delete_containers: true

        # Ubuntu Tests for ADLS account
        - job: Set_2
          timeoutInMinutes: 300

          strategy:
            matrix:
              Ubuntu-20-ADLS:
                AgentName: 'blobfuse-ubuntu20'
                distro: 'ubuntu'
                distro_version: 'ubuntu_20'
                poolName: 'blobfuse-ubuntu-pool'
                fuselib: 'libfuse-dev'
                tags: 'fuse2'
              Ubuntu-22-ADLS:
                AgentName: 'blobfuse-ubuntu22'
                distro: 'ubuntu'
                distro_version: 'ubuntu_22_x86'
                poolName: 'blobfuse-ubuntu-pool'
                fuselib: 'libfuse3-dev'
                tags: 'fuse3'
              Ubuntu-22-ARM64-ADLS:
                AgentName: 'blobfuse-ubn22-arm64'
                distro: 'ubuntu'
                distro_version: 'ubuntu_22_arm64'
                poolName: 'blobfuse-ubn-arm64-pool'
                fuselib: 'libfuse3-dev'
                tags: 'fuse3'

          pool:
            name: $(poolName)
            demands:
              - ImageOverride -equals $(AgentName)

          variables:
            - group: NightlyBlobFuse
            - name: MOUNT_DIR
              value: '$(Pipeline.Workspace)/blob_mnt'
            - name: TEMP_DIR
              value: '$(Pipeline.Workspace)/blobfuse2_tmp'
            - name: BLOBFUSE2_CFG
              value: '$(Pipeline.Workspace)/blobfuse2.yaml'
            - name: BLOBFUSE2_SAS_CFG
              value: '$(Pipeline.Workspace)/blobfuse2_sas_config.yaml'
            - name: BLOBFUSE2_AZCLI_CFG
              value: '$(Pipeline.Workspace)/blobfuse2_azcli_config.yaml'
            - name: BLOBFUSE2_ADLS_CFG
              value: '$(Pipeline.Workspace)/blobfuse2.adls.yaml'
            - name: BLOBFUSE2_GTEST_CFG
              value: '$(Pipeline.Workspace)/connection.yaml'
            - name: BLOBFUSE2_AZURITE_CFG
              value: '$(Pipeline.Workspace)/blobfuse2_azurite_config.yaml'
            - name: BLOBFUSE2_STRESS_DIR
              value: '$(Pipeline.Workspace)/blobfuse2_stress'
            - name: DECODE_PERCENTS
              value: false
            - name: GOPATH
              value: '$(Pipeline.Workspace)/go'
            - name: ROOT_DIR
              value: '$(Agent.TempDirectory)'
            - name: WORK_DIR
              value: '$(Build.SourcesDirectory)'

          steps:
            # -------------------------------------------------------
            # Pull and build the code, Create the Containers in storage account
            - template: 'azure-pipeline-templates/build.yml'
              parameters:
                skip_ut: true # Skip UT because Block Blob set runs it
                skip_azcli: "false"

            # -------------------------------------------------------
            - ${{ if eq(parameters.exhaustive_test, true) }}:
              - template: 'azure-pipeline-templates/verbose-tests.yml'
                parameters:
                  service: 'ADLS'
                  account_type: 'adls'
                  account_endpoint: 'https://$(BF2_ADLS_ACC_NAME).dfs.core.windows.net'
                  adls: true
                  account_name: $(BF2_ADLS_ACC_NAME)
                  account_key: $(BF2_ADLS_ACC_KEY)
                  account_sas: $(BF2_ADLS_ACC_SAS)
                  client_id: $(AZTEST_CLIENT)
                  tenant_id: $(AZTEST_TENANT)
                  client_secret: $(AZTEST_SECRET)
                  config: $(BLOBFUSE2_ADLS_CFG)
                  stress_dir: $(BLOBFUSE2_STRESS_DIR)
                  huge_container: 'million-files'
                  quick_stress: ${{ parameters.quick_stress }}
                  test_key_credential: true
                  test_sas_credential: true
                  test_azcli_credential: false
                  test_azurite: false
                  sas_credential_config: $(BLOBFUSE2_SAS_CFG)
                  azcli_credential_config: $(BLOBFUSE2_AZCLI_CFG)
                  azurite_config: $(BLOBFUSE2_AZURITE_CFG)
                  distro_name: $(AgentName)
                  verbose_log: ${{ parameters.verbose_log }}

            - template: azure-pipeline-templates/cleanup.yml
              parameters:
                unmount: true
                delete_containers: true


        - ${{ if eq(parameters.proxy_test, true) }}:
            # -----------------------------------------------------------
            # Ubuntu-20.04 Proxy tests
          - job: Set_3
            timeoutInMinutes: 300
            strategy:
              matrix:
                Ubuntu-20-Proxy:
                  AgentName: 'blobfuse-ubuntu20'
                  distro: 'ubuntu'
                  distro_version: 'ubuntu_20'

            pool:
              name: "blobfuse-ubuntu-pool"
              demands:
                - ImageOverride -equals $(AgentName)

            variables:
              - group: NightlyBlobFuse
              - name: MOUNT_DIR
                value: '$(Pipeline.Workspace)/blob_mnt'
              - name: TEMP_DIR
                value: '$(Pipeline.Workspace)/blobfuse2_tmp'
              - name: BLOBFUSE2_CFG
                value: '$(Pipeline.Workspace)/blobfuse2_proxy.yaml'
              - name: BLOBFUSE2_ADLS_CFG
                value: '$(Pipeline.Workspace)/blobfuse2_proxy.adls.yaml'
              - name: DECODE_PERCENTS
                value: false
              - name: GOPATH
                value: '$(Pipeline.Workspace)/go'
              - name: ROOT_DIR
                value: '$(Agent.TempDirectory)'
              - name: WORK_DIR
                value: '$(Build.SourcesDirectory)'

            steps:
              # -------------------------------------------------------
              # Pull, build and unit test the code, create the containers.
              - template: 'azure-pipeline-templates/build.yml'
                parameters:
                  proxy_address: "127.0.0.1:8080"
                  skip_ut: true

              # -------------------------------------------------------
              - script: |
                  cd $(WORK_DIR)
                  $(WORK_DIR)/blobfuse2 gen-test-config --config-file=azure_key_proxy.yaml --container-name=$(containerName) --temp-path=$(TEMP_DIR) --output-file=$(BLOBFUSE2_CFG)
                displayName: 'Create Config File'
                env:
                  STO_ACC_NAME: $(BF2_BLK_ACC_NAME)
                  STO_ACC_KEY: $(BF2_BLK_ACC_KEY)
                  STO_ACC_TYPE: 'block'
                  STO_ACC_ENDPOINT: 'https://$(BF2_BLK_ACC_NAME).blob.core.windows.net'
                  VERBOSE_LOG: ${{ parameters.verbose_log }}
                continueOnError: false

              - script:
                  cat $(BLOBFUSE2_CFG)
                displayName: "Print config file"

              # --------------------------------------------------
              # End to End tests
              - template: 'azure-pipeline-templates/e2e-tests.yml'
                parameters:
                  idstring: 'BlockBlob with Proxy and Key Credentials'
                  distro_name: $(AgentName)
                  adls: false
                  artifact_name: 'blockblob_proxy_key.txt'
                  verbose_log: ${{ parameters.verbose_log }}
                  mountStep:
                    script: |
                      $(WORK_DIR)/blobfuse2 mount $(MOUNT_DIR) --config-file=$(BLOBFUSE2_CFG) --default-working-dir=$(WORK_DIR)
                    displayName: 'E2E TEST: Mount'
                    timeoutInMinutes: 3
                    continueOnError: false

              # --------------------------------------------------
              - script: |
                  cd $(WORK_DIR)
                  $(WORK_DIR)/blobfuse2 gen-test-config --config-file=azure_key_proxy.yaml --container-name=$(containerName) --temp-path=$(TEMP_DIR) --output-file=$(BLOBFUSE2_ADLS_CFG)
                displayName: 'Create ADLS Config File'
                env:
                  STO_ACC_NAME: $(BF2_ADLS_ACC_NAME)
                  STO_ACC_KEY: $(BF2_ADLS_ACC_KEY)
                  STO_ACC_TYPE: 'adls'
                  STO_ACC_ENDPOINT: 'https://$(BF2_ADLS_ACC_NAME).dfs.core.windows.net'
                  VERBOSE_LOG: ${{ parameters.verbose_log }}
                continueOnError: false

              - script:
                  cat $(BLOBFUSE2_ADLS_CFG)
                displayName: "Print ADLS config file"

              - template: 'azure-pipeline-templates/e2e-tests.yml'
                parameters:
                  idstring: 'ADLS with Proxy and Key Credentials'
                  distro_name: $(AgentName)
                  adls: true
                  artifact_name: 'adls_proxy_key.txt'
                  verbose_log: ${{ parameters.verbose_log }}
                  mountStep:
                    script: |
                      $(WORK_DIR)/blobfuse2 mount $(MOUNT_DIR) --config-file=$(BLOBFUSE2_ADLS_CFG) --default-working-dir=$(WORK_DIR)
                    displayName: 'FeatureTest ADLS: Mount'
                    timeoutInMinutes: 3
                    continueOnError: false
              # ------------------------------------------------------------
              # Auth Tests

              # Block SAS test
              - script: |
                  cd $(WORK_DIR)
                  $(WORK_DIR)/blobfuse2 gen-test-config --config-file=azure_sas_proxy.yaml --container-name=$(containerName) --temp-path=$(TEMP_DIR) --output-file=$(BLOBFUSE2_CFG)
                displayName: "Create SAS Config File"
                env:
                  STO_ACC_NAME: $(BF2_BLK_ACC_NAME)
                  STO_ACC_SAS: $(BF2_BLK_ACC_SAS)
                  STO_ACC_ENDPOINT: 'https://$(BF2_BLK_ACC_NAME).blob.core.windows.net'
                  VERBOSE_LOG: ${{ parameters.verbose_log }}
                continueOnError: false

              - script:
                  cat $(BLOBFUSE2_CFG)
                displayName: "Print SAS config file"

              - template: 'azure-pipeline-templates/verify-auth.yml'
                parameters:
                  idstring: 'Block SAS'
                  distro_name: $(AgentName)
                  mountStep:
                    script: |
                      $(WORK_DIR)/blobfuse2 mount $(MOUNT_DIR) --config-file=$(BLOBFUSE2_CFG) --default-working-dir=$(WORK_DIR)
                    displayName: 'AuthVerify-SAS: Mount'
                    continueOnError: false

              # ------------------------------------------------------------
              - template: 'azure-pipeline-templates/cleanup.yml'
                parameters:
                  unmount: true
                  delete_containers: true

              - script: |
                  kill -9 $(pgrep mitmdump) || true
                displayName: 'Kill Proxy'

        - ${{ if eq(parameters.msi_test, true) }}:
          # -----------------------------------------------------------
          # Ubuntu-20.04 MSI tests
          - job: Set_4
            timeoutInMinutes: 60
            strategy:
              matrix:
                Ubuntu-20-MSI:
                  DistroVer: "Ubn20_MSI"
                  distro: 'ubuntu'
                  distro_version: 'ubuntu_20'
                  AgentName: "blobfuse-ubuntu20"
                  Description: "Ubuntu 20 MSI Test"

            pool:
              name: "blobfuse-ubuntu-pool"
              demands:
                - ImageOverride -equals $(AgentName)

            variables:
              - group: NightlyBlobFuse
              - name: MOUNT_DIR
                value: '$(Pipeline.Workspace)/blob_mnt'
              - name: TEMP_DIR
                value: '$(Pipeline.Workspace)/blobfuse2_tmp'
              - name: BLOBFUSE2_CFG
                value: '$(Pipeline.Workspace)/blobfuse2.msi.yaml'
              - name: BLOBFUSE2_ADLS_CFG
                value: '$(Pipeline.Workspace)/blobfuse2.msi.adls.yaml'
              - name: GOPATH
                value: '$(Pipeline.Workspace)/go'
              - name: ROOT_DIR
                value: '$(Agent.TempDirectory)'
              - name: WORK_DIR
                value: '$(Build.SourcesDirectory)'
              - name: skipComponentGovernanceDetection
                value: true

            steps:
              # Print the agent info
              - script: |
                  echo $(Description)
                  hostnamectl
                displayName: 'Print Agent Info'

              # Build the code
              - template: 'azure-pipeline-templates/build.yml'
                parameters:
                  skip_msi: "false"
                  skip_azcli: "false"

              # BlockBlob MSI Test
              - script: |
                  cd $(WORK_DIR)
                  $(WORK_DIR)/blobfuse2 gen-test-config --config-file=azure_msi.yaml --container-name=$(containerName) --temp-path=$(TEMP_DIR) --output-file=$(BLOBFUSE2_CFG)
                displayName: "Create MSI Config File"
                env:
                  STO_ACC_NAME: $(BF2_BLK_ACC_NAME)
                  STO_MSI_APP_ID: $(BF2_MSI_CLIENT_ID)
                  STO_ACC_TYPE: 'block'
                  STO_ACC_ENDPOINT: 'https://$(BF2_BLK_ACC_NAME).blob.core.windows.net'
                  VERBOSE_LOG: ${{ parameters.verbose_log }}
                continueOnError: false

              - script:
                  cat $(BLOBFUSE2_CFG)
                displayName: "Print config file"

              # Mount the container and run basic tests
              - template: 'azure-pipeline-templates/verify-auth.yml'
                parameters:
                  idstring: 'BlockBlob MSI'
                  distro_name: $(AgentName)
                  mountStep:
                    script: |
                      $(WORK_DIR)/blobfuse2 mount $(MOUNT_DIR) --config-file=$(BLOBFUSE2_CFG)
                    displayName: 'AuthVerify MSI: Mount Container'
                    continueOnError: true

              # ADLS MSI Test
              - script: |
                  cd $(WORK_DIR)
                  $(WORK_DIR)/blobfuse2 gen-test-config --config-file=azure_msi.yaml --container-name=$(containerName) --temp-path=$(TEMP_DIR) --output-file=$(BLOBFUSE2_CFG)
                displayName: "Create MSI Config File"
                env:
                  STO_ACC_NAME: $(BF2_ADLS_ACC_NAME)
                  STO_MSI_APP_ID: $(BF2_MSI_CLIENT_ID)
                  STO_ACC_TYPE: 'adls'
                  STO_ACC_ENDPOINT: 'https://$(BF2_ADLS_ACC_NAME).dfs.core.windows.net'
                  VERBOSE_LOG: ${{ parameters.verbose_log }}
                continueOnError: true

              - script:
                  cat $(BLOBFUSE2_CFG)
                displayName: "Print config file"

              # Mount the cntainer and run basic tests
              - template: 'azure-pipeline-templates/verify-auth.yml'
                parameters:
                  idstring: 'ADLS MSI'
                  distro_name: $(AgentName)
                  mountStep:
                    script: |
                      $(WORK_DIR)/blobfuse2 mount $(MOUNT_DIR) --config-file=$(BLOBFUSE2_CFG)
                    displayName: 'AuthVerify MSI: Mount Container'
                    continueOnError: true

              # Cleanup
              - template: 'azure-pipeline-templates/cleanup.yml'
                parameters:
                  unmount: true
                  delete_containers: true


        - ${{ if eq(parameters.include_other_distros, true) }}:
          # Run E2E tests on different distros
          - job: Set_5
            continueOnError: true
            timeoutInMinutes: 60
            strategy:
              matrix:
                RHEL-8.6:
                  distro_version: 'RHEL-8.6'
                  distro: rhel
                  poolName: 'blobfuse-rhel-pool'
                  containerName: "test-cnt-rhel-86"
                  Description: 'Red Hat Enterprise Linux 8.6'
                  AgentName: 'blobfuse-rhel8_6'
                  tags: 'fuse3'
                RHEL-9.0:
                  distro_version: 'RHEL-9.0'
                  distro: rhel
                  poolName: 'blobfuse-rhel-pool'
                  containerName: "test-cnt-rhel-9"
                  Description: 'Red Hat Enterprise Linux 9.0'
                  AgentName: 'blobfuse-rhel9'
                  tags: 'fuse3'
                # Commenting as CentOS 7.9 image is not available in the marketplace currently
                # CentOS-7.9:
                #   distro_version: "CentOS-7.9"
                #   distro: centos
                #   poolName: 'blobfuse-centos-pool'
                #   containerName: "test-cnt-cent-7"
                #   Description: "CentOS 7.9"
                #   AgentName: "blobfuse-centos7"
                CentOS-8.5:
                  distro_version: "CentOS-8.5"
                  distro: centos
                  poolName: 'blobfuse-centos-pool'
                  containerName: "test-cnt-cent-8"
                  Description: "CentOS 8.5"
                  AgentName: "blobfuse-centos8"
                Oracle-8.1:
                  distro_version: "Oracle-8.1"
                  distro: oracle
                  poolName: 'blobfuse-oracle-pool'
                  containerName: "test-cnt-ora-81"
                  Description: "Oracle Linux 8.1"
                  AgentName: "blobfuse-oracle81"
                Rocky-8.0:
                  distro_version: "Rocky-8.0"
                  distro: rocky
                  poolName: 'blobfuse2-rocky-pool'
                  containerName: "test-cnt-rocky-8"
                  Description: "Rocky Linux 8.0"
                  AgentName: "blobfuse-rocky8"
                  tags: 'fuse3'
                Rocky-9.0:
                  distro_version: "Rocky-9.0"
                  distro: rocky
                  poolName: 'blobfuse2-rocky-pool'
                  containerName: "test-cnt-rocky-9"
                  Description: "Rocky Linux 9.0"
                  AgentName: "blobfuse-rocky9"
                  tags: 'fuse3'
                SUSE-15:
                  distro_version: "SUSE-15"
                  distro: suse
                  poolName: 'blobfuse-suse-pool'
                  containerName: "test-cnt-suse-15"
                  Description: "SUSE Enterprise Linux 15"
                  AgentName: "blobfuse-suse15"
                Mariner2:
                  distro_version: "Mariner2"
                  distro: mariner
                  poolName: 'blobfuse-mariner-pool'
                  containerName: "test-cnt-mari-2"
                  Description: "CBL-Mariner2 Linux"
                  AgentName: "blobfuse-mariner2"
                  fuselib: 'libfuse3-dev'
                  tags: 'fuse3'
            pool:
              name: $(poolName)
              demands:
                - ImageOverride -equals $(AgentName)

            variables:
              - group: NightlyBlobFuse
              - name: MOUNT_DIR
                value: '$(Pipeline.Workspace)/blob_mnt'
              - name: TEMP_DIR
                value: '$(Pipeline.Workspace)/blobfuse2_tmp'
              - name: BLOBFUSE2_CFG
                value: '$(Pipeline.Workspace)/blobfuse2.yaml'
              - name: BLOBFUSE2_ADLS_CFG
                value: '$(Pipeline.Workspace)/blobfuse2.adls.yaml'
              - name: GOPATH
                value: '$(Pipeline.Workspace)/go'
              - name: ROOT_DIR
                value: '$(Agent.TempDirectory)'
              - name: WORK_DIR
                value: '$(Build.SourcesDirectory)'
              - name: skipComponentGovernanceDetection
                value: true

            steps:
              # Build the code
              - template: 'azure-pipeline-templates/build.yml'

              # Block Blob Test
              - template: 'azure-pipeline-templates/e2e-tests-spcl.yml'
                parameters:
                  conf_template: azure_key.yaml
                  config_file: $(BLOBFUSE2_CFG)
                  idstring: block_blob_key
                  adls: false
                  account_name: $(BF2_BLK_ACC_NAME)
                  account_key: $(BF2_BLK_ACC_KEY)
                  account_type: block
                  distro_name: $(distro_version)
                  quick_test: true
                  verbose_log: ${{ parameters.verbose_log }}
                  clone: false

              # ADLS Test
              - template: 'azure-pipeline-templates/e2e-tests-spcl.yml'
                parameters:
                  conf_template: azure_key.yaml
                  config_file: $(BLOBFUSE2_CFG)
                  idstring: adls_key
                  adls: true
                  account_name: $(BF2_ADLS_ACC_NAME)
                  account_key: $(BF2_ADLS_ACC_KEY)
                  account_type: adls
                  distro_name: $(distro_version)
                  quick_test: true
                  verbose_log: ${{ parameters.verbose_log }}
                  clone: false

              # Cleanup
              - template: 'azure-pipeline-templates/cleanup.yml'
                parameters:
                  unmount: true
                  delete_containers: true

          # Debian 13 (trixie) and Ubuntu 26.04 ship libfuse3 with the bumped SONAME
          # libfuse3.so.4 (libfuse 3.17+), while Debian 11/12 and older Ubuntu still ship
          # libfuse3.so.3. A binary linked against .so.4 cannot load on a .so.3 host and
          # vice versa, so the Debian 13 binary has to be built in an environment that
          # provides .so.4 (and the trixie glibc 2.38 it depends on).
          #
          # 1ES does not currently offer hosted agent images for Debian 13 or Ubuntu 26.04,
          # so this job runs on an Ubuntu 22 agent and the build + e2e suite are executed
          # inside a debian:trixie Docker container. The same binary will also be usable on
          # Ubuntu 26.04 once an agent image is available.
          #
          # TODO: once 1ES publishes a Debian 13 or Ubuntu 26.04 agent image, fold this job
          # back into the standard host-based pattern used by the other Set_* nightly jobs
          # (host build + e2e-tests-spcl.yml template) and drop the inline docker run.
          - job: Set_6
            continueOnError: true
            timeoutInMinutes: 60
            strategy:
              matrix:
                Debian-13:
                  distro_version: "Debian-13"
                  distro: debian
                  containerName: "test-cnt-deb-13"
                  Description: "Debian 13 (trixie)"
                  fuselib: 'libfuse3-dev'
                  tags: 'fuse3'

            pool:
              name: 'blobfuse-ubuntu-pool'
              demands:
                - ImageOverride -equals blobfuse-ubuntu22

            variables:
              - group: NightlyBlobFuse
              - name: MOUNT_DIR
                value: '$(Pipeline.Workspace)/blob_mnt'
              - name: TEMP_DIR
                value: '$(Pipeline.Workspace)/blobfuse2_tmp'
              - name: BLOBFUSE2_CFG
                value: '$(Pipeline.Workspace)/blobfuse2.yaml'
              - name: BLOBFUSE2_ADLS_CFG
                value: '$(Pipeline.Workspace)/blobfuse2.adls.yaml'
              - name: GOPATH
                value: '$(Pipeline.Workspace)/go'
              - name: ROOT_DIR
                value: '$(Agent.TempDirectory)'
              - name: WORK_DIR
                value: '$(Build.SourcesDirectory)'
              - name: skipComponentGovernanceDetection
                value: true

            steps:
              - script: |
                  sudo apt-get update --fix-missing
                  sudo apt-get install -y docker.io
                  sudo systemctl start docker
                displayName: "Install Docker"

              - script: |
                  sudo docker run --rm debian:trixie bash -c "apt-get update -qq && apt-get install -y fuse3 libfuse3-dev && dpkg -l | grep fuse"
                displayName: "Verify fuse version in Debian 13"

              # The binary built here links trixie's libfuse3.so.4 (needs glibc 2.38), which
              # the Ubuntu 22 host agent (glibc 2.35) cannot load. So the build AND the e2e
              # suite both run inside the debian:trixie container. The host-level
              # e2e-tests-spcl.yml template (Go@0 tasks) cannot run inside `docker run`, so its
              # gen-test-config -> mount -> go test flow is inlined here. Storage secrets are
              # mapped via env: and forwarded with `docker run -e NAME` (value never on the
              # command line); sudo --preserve-env keeps them across the privileged docker call.
              - script: |
                  sudo --preserve-env=BF2_BLK_ACC_NAME,BF2_BLK_ACC_KEY,BF2_ADLS_ACC_NAME,BF2_ADLS_ACC_KEY \
                    docker run --rm \
                    --device /dev/fuse --cap-add SYS_ADMIN --security-opt apparmor:unconfined \
                    -v $(Build.SourcesDirectory):$(Build.SourcesDirectory) \
                    -v $(Agent.TempDirectory):$(Agent.TempDirectory) \
                    -v $(Pipeline.Workspace):$(Pipeline.Workspace) \
                    -e BF2_BLK_ACC_NAME -e BF2_BLK_ACC_KEY \
                    -e BF2_ADLS_ACC_NAME -e BF2_ADLS_ACC_KEY \
                    -w $(Build.SourcesDirectory) \
                    debian:trixie bash -c "
                      set -e
                      export DEBIAN_FRONTEND=noninteractive

                      echo '---------------------------------------------------'
                      echo 'Installing build and FUSE dependencies'
                      apt-get update --fix-missing -qq
                      apt-get install -y ca-certificates curl wget git sudo build-essential pkg-config libfuse3-dev fuse3

                      echo '---------------------------------------------------'
                      echo 'Installing Microsoft Go toolchain and fetching modules'
                      $(Build.SourcesDirectory)/go_installer.sh $(Agent.TempDirectory)/
                      export GOROOT=/usr/local/go
                      export GOPATH=$(Pipeline.Workspace)/go
                      export PATH=\$GOROOT/bin:\$PATH
                      git config --global --add safe.directory $(Build.SourcesDirectory)
                      go mod download

                      echo '---------------------------------------------------'
                      echo 'Building blobfuse2 binary and verifying libfuse3.so.4 linkage'
                      chmod 755 build.sh
                      ./build.sh fuse3
                      chmod +x ./blobfuse2
                      ./blobfuse2 --version
                      ldd ./blobfuse2 | grep libfuse3.so.4

                      echo '---------------------------------------------------'
                      echo 'Building health-monitor (bfusemon) binary'
                      ./build.sh health
                      chmod +x ./bfusemon
                      ./bfusemon --version

                      run_suite() {
                        local name=\$1 acctype=\$2 adls=\$3 accname=\$4 acckey=\$5

                        echo '---------------------------------------------------'
                        echo \"Running E2E suite : \${name}\"

                        echo '---------------------------------------------------'
                        echo \"Prepare Blobfuse Directories : \${name}\"
                        rm -rf $(MOUNT_DIR) $(TEMP_DIR)
                        mkdir -p $(MOUNT_DIR) $(TEMP_DIR)

                        echo '---------------------------------------------------'
                        echo \"Create Config File : \${name}\"
                        cd $(Build.SourcesDirectory)
                        STO_ACC_NAME=\$accname STO_ACC_KEY=\$acckey STO_ACC_TYPE=\$acctype VERBOSE_LOG=false \
                          ./blobfuse2 gen-test-config --config-file=azure_key.yaml --container-name=$(containerName) --temp-path=$(TEMP_DIR) --output-file=$(Pipeline.Workspace)/\${name}.yaml

                        echo '---------------------------------------------------'
                        echo \"Print Config File : \${name}\"
                        cat $(Pipeline.Workspace)/\${name}.yaml

                        echo '---------------------------------------------------'
                        echo \"Mount Blobfuse2 : \${name}\"
                        ./blobfuse2 unmount all || true
                        fusermount3 -u $(MOUNT_DIR) || true
                        ./blobfuse2 mount $(MOUNT_DIR) --config-file=$(Pipeline.Workspace)/\${name}.yaml --default-working-dir=$(System.DefaultWorkingDirectory)

                        # Waiting for Mount
                        sleep 10

                        echo '---------------------------------------------------'
                        echo \"Verify Mount : \${name}\"
                        df | grep blobfuse2

                        echo '---------------------------------------------------'
                        echo \"E2E Test : \${name}\"
                        set +e
                        cd $(Build.SourcesDirectory)/test/e2e_tests
                        go test -v -timeout=2h ./... -args -mnt-path=$(MOUNT_DIR) -adls=\${adls} -clone=false -tmp-path=$(TEMP_DIR) -quick-test=true -distro-name='$(distro_version)'

                        rc=\$?
                        cd $(Build.SourcesDirectory)

                        # View logs
                        # Commented as it is very verbose. Uncomment if you want to see the logs in the pipeline.
                        # tail -n 200 blobfuse2-logs.txt || true

                        # Clear Logs
                        > blobfuse2-logs.txt || true

                        echo '---------------------------------------------------'
                        echo \"Unmount Blobfuse2 : \${name}\"
                        set -e
                        sleep 5
                        ./blobfuse2 unmount $(MOUNT_DIR) || true
                        fusermount3 -u $(MOUNT_DIR) || true

                        return \$rc
                      }

                      # Block Blob
                      run_suite block_blob block false \$BF2_BLK_ACC_NAME \$BF2_BLK_ACC_KEY

                      # ADLS
                      run_suite adls adls true \$BF2_ADLS_ACC_NAME \$BF2_ADLS_ACC_KEY
                    "
                displayName: "Build and run E2E tests inside Debian 13 container"
                env:
                  BF2_BLK_ACC_NAME: $(BF2_BLK_ACC_NAME)
                  BF2_BLK_ACC_KEY: $(BF2_BLK_ACC_KEY)
                  BF2_ADLS_ACC_NAME: $(BF2_ADLS_ACC_NAME)
                  BF2_ADLS_ACC_KEY: $(BF2_ADLS_ACC_KEY)


