# Refer ./setup/baseConfig.yaml for full set of config parameters

logging:
  type: syslog
  level: log_debug

components:
  - libfuse
  - file_cache
  - attr_cache
  - azstorage

libfuse:
  attribute-expiration-sec: 120
  entry-expiration-sec: 120
  negative-entry-expiration-sec: 240

file_cache:
  path: /<PATH>/<TO>/<CACHE_DIR>
  timeout-sec: 120
  max-size-mb: 4096

attr_cache:
  timeout-sec: 7200
  # max-size-mb controls how much memory the attribute cache may use. Default is 64 MB (~70K entries).
  # Set to 0 to disable memory-based eviction and rely solely on TTL expiry.
  # max-size-mb: 64

azstorage:
  type: block
  account-name: <ACCOUNT_NAME>
  sas: <SAS_TOKEN>
  mode: sas
  container: <CONTAINER_NAME>
 