logging:
  level: log_debug
  file-path: "blobfuse2-logs.txt"
  type: base

account-name: { STO_ACC_NAME }
container-name: { 0 }
auth:
  type: key
  account-account-key: { STO_ACC_KEY }

components:
  - libfuse
  - block_cache
  - loopbackfs

loopbackfs:
  path: { 1 }

# Test block cache with low memory for stress testing.
block_cache:
  block-size-mb: 8
  mem-size-mb: 128
